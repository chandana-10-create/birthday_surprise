<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open My Letter ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
overflow:hidden;
}

.container{
text-align:center;
}

.envelope{
font-size:130px;
cursor:pointer;
transition:.4s;
animation:float 2s infinite ease-in-out;
}

.envelope:hover{
transform:scale(1.1);
}

h2{
margin-top:20px;
color:#d63384;
font-size:32px;
}

p{
margin-top:10px;
color:#555;
font-size:18px;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<div class="envelope" onclick="openLetter()">
💌
</div>

<h2>Open My Letter ❤️</h2>

<p>Tap the envelope to read what's inside...</p>
</div>

<script>

function openLetter(){

document.querySelector(".envelope").innerHTML="💖";

document.querySelector("h2").innerHTML="Opening Your Letter... ❤️";

document.querySelector("p").innerHTML="Please wait a moment... 🥹";

setTimeout(function(){

window.location.href="ll.html";

},2000);

}

</script>

</body>

</html>
