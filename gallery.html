<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For someone so special ❤️</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
overflow:hidden;
}

.container{
text-align:center;
color:white;
}

img{
width:300px;
height:400px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,.5);
}

h2{
margin-bottom:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>Our Beautiful Memories ❤️</h2>

<img id="photo" src="images/photo1.jpg">

</div>

<script>

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
];

let i=0;

setInterval(function(){

i++;

if(i>=photos.length){
window.location.href="letter.html";
return;
}

document.getElementById("photo").src=photos[i];

},3000);

</script>

</body>
</html>
