<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For someone so special ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
overflow:hidden;
}

.card{
width:320px;
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 10px 30px rgba(255,0,100,.3);
text-align:center;
animation:fade 1s;
}

img{
width:100%;
height:400px;
object-fit:cover;
border-radius:15px;
}

#quote{
margin-top:15px;
font-size:20px;
color:#ff0066;
font-weight:bold;
line-height:1.6;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<div class="card">

<img id="photo" src="photo1.jpg">

<p id="quote">
❤️ Everyday,from the moment I wake up, you are the first person in my mind.❤️
</p>


</div>

<script>

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
];

let quotes = [
"❤️ Every day, from the moment I wake up, you are the first person on my mind. ❤️",
"❤️ Wishing the sweetest soul the happiest birthday ever. ❤️",
"❤️ Every picture reminds me how lucky I am to have you. ❤️",
"❤️ Every moment with you becomes a beautiful memory. ❤️",
"❤️ Happy Birthday to someone who means so much to me. ❤️"
];

let index=0;
setInterval(function(){

index++;

if(index>=photos.length){
window.location.href="letter.html";
window.location.href="ll.html";
return;
}

document.getElementById("photo").src=photos[index];
document.getElementById("quote").innerHTML=quotes[index];

},3000);
</script>

</body>
</html>
