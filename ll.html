<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Note For You ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-y:auto;

background:url("images/paper.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.letter{
width:90%;
max-width:430px;
background:rgba(255,255,255,.88);
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
position:relative;
z-index:2;
}

.bow{
font-size:45px;
}

h1{
font-size:38px;
color:#d63384;
margin:15px 0;
font-family:cursive;
}

#letter{
font-size:18px;
line-height:1.9;
color:#b3003c;
white-space:pre-line;
text-align:left;
min-height:420px;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff4d94;
color:white;
font-size:18px;
cursor:pointer;
display:none;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.cursor{
display:inline-block;
font-size:22px;
font-weight:bold;
color:#d63384;
animation:blink .8s infinite;
}

@keyframes blink{

50%{
opacity:0;
}

}

.heart{
position:fixed;
font-size:24px;
animation:float 7s linear infinite;
opacity:.8;
z-index:1;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>
<body>

<div class="heart" style="left:8%;">❤️</div>
<div class="heart" style="left:25%;animation-delay:2s;">💖</div>
<div class="heart" style="left:45%;animation-delay:4s;">💕</div>
<div class="heart" style="left:65%;animation-delay:1s;">💗</div>
<div class="heart" style="left:85%;animation-delay:3s;">❤️</div>

<div class="letter">

<div class="bow">🎀</div>

<h1>A Note For You ❤️</h1>

<p id="letter"></p>

<button id="nextBtn" onclick="window.location.href='cake.html'">
Forever & Always ❤️
</button>

</div>
<script>

let message = `Happiest Birthday my love🫀

On your special day, I just want you to know how much you truly mean to me.🥹💝

Every moment with you is a beautiful memory that I'll cherish forever.💌🎁

From the moment I wake up until I close my eyes, you're always on my mind.🫂🩷

Your smile makes my world brighter, and your happiness means everything to me.🌎🎂🎁

I Love You So Much... ❤️

I Don't Wanna Miss You... Ever. 🥺❤️



❤️`;

let i = 0;

let letter = document.getElementById("letter");

let cursor = document.createElement("span");
cursor.className = "cursor";
cursor.innerHTML = "|";
letter.after(cursor);

function typeLetter(){

    if(i < message.length){

        letter.innerHTML += message.charAt(i);

        i++;

        setTimeout(typeLetter,40);

    }else{

        cursor.style.display="none";

        document.getElementById("nextBtn").style.display="inline-block";

    }

}

window.onload = function(){

typeLetter();

};

</script>

</body>

</html>
